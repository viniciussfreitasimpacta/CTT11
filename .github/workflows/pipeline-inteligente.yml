name: Pipeline Inteligente

on:
  # Regra 1: execução manual
  workflow_dispatch:

  # Regra 2: rodar todo dia às 02:00
  schedule:
    - cron: "0 2 * * *"

  # Regra 3 + 4: push controlado
  push:
    branches:
      - 'feature/*'
    paths:
      - 'src/**'
      - '!src/docs/**'

jobs:
  job_gerador:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Gerar relatórios
        run: |
          mkdir saida_build
          echo "Relatório 1 OK" > saida_build/relatorio1.txt
          echo "Relatório 2 OK" > saida_build/relatorio2.txt

      - name: Upload de artefatos
        uses: actions/upload-artifact@v4
        with:
          name: meus-relatorios-oficiais
          path: saida_build/

  job_auditoria:
    runs-on: ubuntu-latest
    needs: job_gerador

    steps:
      - name: Baixar artefatos
        uses: actions/download-artifact@v4
        with:
          name: meus-relatorios-oficiais

      - name: Listar arquivos
        run: ls -R

      - name: Mostrar conteúdo
        run: cat relatorio1.txt
